version: 2

models:

  - name: dim_customers
    description: Customer dimension table with one row per customer. Combines cleaned customer attributes with subscription and revenue aggregates to support reporting.

    columns:
      - name: customer_id
        description: Unique identifier for the customer.
        tests:
          - unique
          - not_null

      - name: customer_email
        description: Normalised email address for the customer.

      - name: region
        description: Customer region derived from metadata.

      - name: lifetime_value
        description: Total revenue generated by the customer.
        tests:
          - not_null

      - name: current_subscription_status
        description: Derived status indicating whether the customer is active or churned .
        tests:
          - not_null

  - name: fct_mrr_monthly
    description: Monthly recurring revenue fact table at the grain of one row per customer per month.

    columns:
      - name: customer_id
        description: Customer identifier.
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id

      - name: revenue_month
        description: Month representing the revenue reporting period.
        tests:
          - not_null

      - name: mrr
        description: Monthly recurring revenue attributed to the customer.
        tests:
          - not_null
